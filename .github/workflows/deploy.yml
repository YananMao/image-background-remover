name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug - List files
        run: |
          ls -la
          echo "--- package-lock.json ---"
          ls -la package-lock.json 2>/dev/null || echo "NOT FOUND"
          head -5 package-lock.json 2>/dev/null || echo "CANNOT READ"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci --include=dev
          echo "Checking @opennextjs/cloudflare..."
          ls -la node_modules/@opennextjs/cloudflare 2>/dev/null || echo "NOT FOUND"

      - name: Build and Deploy to Cloudflare Workers
        run: npx opennextjs-cloudflare build && npx opennextjs-cloudflare deploy
        env:
          REMOVEBG_API_KEY: ${{ secrets.REMOVEBG_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
